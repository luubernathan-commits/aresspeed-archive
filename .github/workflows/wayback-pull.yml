name: Wayback Image Pull

on:
  workflow_dispatch:
    inputs:
      domain:
        description: Domain to mirror from Wayback (no protocol)
        required: true
        default: aresspeed.com.au
      target_dir:
        description: Folder to write images into
        required: true
        default: site
      subdir:
        description: Subfolder under target_dir for the pull
        required: true
        default: _wayback_pull_clean

jobs:
  pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch CDX inventory + download with clean paths
        run: |
          python - <<'PY'
          import json, os, sys, time, urllib.parse, urllib.request, pathlib

          DOMAIN  = "${{ github.event.inputs.domain }}"
          TARGET  = "${{ github.event.inputs.target_dir }}"
          SUBDIR  = "${{ github.event.inputs.subdir }}"
          OUTROOT = pathlib.Path(TARGET) / SUBDIR
          OUTROOT.mkdir(parents=True, exist_ok=True)
          pathlib.Path("tools").mkdir(exist_ok=True)

          cdx = (
              f"https://web.archive.org/cdx/search/cdx?url={DOMAIN}/*"
              "&output=json&filter=mimetype:image/.*"
              "&fl=original,timestamp&collapse=urlkey"
          )
          print("CDX:", cdx)
          req = urllib.request.Request(cdx, headers={"User-Agent": "AresSpeedArchiveBot/2.0"})
          with urllib.request.urlopen(req, timeout=60) as r:
              rows = json.load(r)[1:]
          print(f"Total URLs: {len(rows)}")

          # Persist URL list for reproducibility
          with open("tools/ares_images.txt", "w") as f:
              for original, ts in rows:
                  f.write(f"https://web.archive.org/web/{ts}id_/{original}\n")

          ok = fail = skip = 0
          for i, (original, ts) in enumerate(rows, 1):
              parsed = urllib.parse.urlparse(original)
              # Clean path: strip leading slash, decode %xx, drop :80 host suffixes
              rel = urllib.parse.unquote(parsed.path.lstrip("/"))
              if not rel:
                  rel = "index_image"
              # Sanitise illegal characters for any FS
              rel = rel.replace(":", "_").replace("?", "_").replace("*", "_").replace('"', "_").replace("<", "_").replace(">", "_").replace("|", "_")
              out = OUTROOT / rel
              if out.exists() and out.stat().st_size > 0:
                  skip += 1
                  continue
              out.parent.mkdir(parents=True, exist_ok=True)
              wb = f"https://web.archive.org/web/{ts}id_/{original}"
              try:
                  req2 = urllib.request.Request(wb, headers={"User-Agent": "AresSpeedArchiveBot/2.0"})
                  with urllib.request.urlopen(req2, timeout=45) as r:
                      data = r.read()
                  out.write_bytes(data)
                  ok += 1
                  if i % 25 == 0:
                      print(f"[{i}/{len(rows)}] ok={ok} fail={fail} skip={skip}  last={rel}")
              except Exception as e:
                  fail += 1
                  print(f"FAIL {wb}: {e}")
              time.sleep(0.8)

          print(f"DONE  ok={ok}  fail={fail}  skip={skip}  total={len(rows)}")
          PY

      - name: Commit pulled images
        run: |
          git config user.name  "wayback-bot"
          git config user.email "wayback-bot@users.noreply.github.com"
          git add tools/ares_images.txt "${{ github.event.inputs.target_dir }}/${{ github.event.inputs.subdir }}"
          git commit -m "Wayback pull v2 (clean paths): ${{ github.event.inputs.domain }} ($(date -u +%Y-%m-%d))" || echo "Nothing to commit"
          git push
